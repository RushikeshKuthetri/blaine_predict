
<label *ngIf="type=='datepicker'" class="dateTimebox">
   <input [owlDateTime]="dt1" [owlDateTimeTrigger]="dt1"  class="form-control" (dateTimeChange)="onselectDateTime($event)"
      placeholder="Date Time">
   <owl-date-time  [pickerType]="'calendar'" #dt1></owl-date-time>
</label>
<label *ngIf="type=='rangepicker'" class="dateTimebox">
   <input [owlDateTimeTrigger]="dt10" class="form-control" (dateTimeChange)="onselectDateTimeRange($event)" [owlDateTime]="dt10"
      [selectMode]="'range'" placeholder="Select Date Range"  [max]="maxDate" [(ngModel)]="selectedRange">
   <owl-date-time  [pickerType]="'calendar'" #dt10></owl-date-time>
</label>
