<ng-container *ngIf="mounted">

  <!-- ── MOBILE HAMBURGER ─────────────────────────────────────── -->
  <button *ngIf="!open" class="lg:hidden fixed top-20 left-4 z-50 p-2 rounded-lg bg-[var(--bg-leftdrawer)] shadow"
    (click)="openChange.emit(true)">
    <!-- Bars icon -->
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-[var(--text-color)]" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd"
        d="M3 5h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2zm0 4h14a1 1 0 010 2H3a1 1 0 010-2z"
        clip-rule="evenodd" />
    </svg>
  </button>

  <!-- ── BACKDROP (mobile) ────────────────────────────────────── -->
  <div *ngIf="open" class="fixed inset-0 bg-[var(--bg-color)] backdrop-blur-sm z-30 lg:hidden" (click)="closeMobile()"></div>

  <!-- ══════════════════════════════════════════════════════════ -->
  <!-- SIDEBAR                                                    -->
  <!-- ══════════════════════════════════════════════════════════ -->
   <div
    class="fixed top-[70px] left-0 z-40 h-[calc(100dvh-105px)] overflow-y-auto flex flex-col rounded-r-3xl
           bg-[var(--bg-leftdrawer)] [box-shadow:var(--left-drawer-shadow)]
           transition-all duration-300"
    [class.lg:w-20]="collapsed"
    [class.lg:w-60]="!collapsed"
    [class.w-60]="true"
    [class.translate-x-0]="open"
    [class.-translate-x-full]="!open"
    [class.lg:translate-x-0]="true"
  >

    <!-- ── MOBILE CLOSE BUTTON ─────────────────────────────── -->
    <div class="lg:hidden flex justify-end pt-3 pr-3 -mb-2">
      <button (click)="closeMobile()">
        <!-- X icon -->
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-[var(--leftdrawer-text)]" fill="none"
          viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- ── MENU LIST ────────────────────────────────────────── -->
    <div class="flex-1 overflow-y-auto custom-scrollbar flex flex-col px-3 gap-1 mt-2">

      <ng-container *ngFor="let item of menuItems; let i = index">
        <div>

          <!-- ── PARENT MENU ITEM ──────────────────────────── -->
          <div class="flex items-center py-2 px-3 pr-2 rounded-xl transition-all cursor-pointer"
            [class.justify-center]="collapsed" [class.gap-4]="!collapsed" [class.px-3]="!collapsed"
            [class.pr-2]="!collapsed" [ngClass]="{
              'bg-[var(--left-drawer-active-tab)] text-[#111111] font-semibold': !item.hasDropdown && isActiveRoute(item.path),
              'text-[var(--leftdrawer-text)] hover:bg-[var(--left-drawer-active-tab)] hover:text-[#111111]': item.hasDropdown || !isActiveRoute(item.path)
            }" (click)="item.hasDropdown ? handleParentClick(item) : null">

            <!-- Dropdown parent (not a link) -->
            <ng-container *ngIf="item.hasDropdown; else linkItem">
              <!-- Icon -->
              <ng-container *ngTemplateOutlet="iconTpl; context: { $implicit: item.icon }"></ng-container>
              <ng-container *ngIf="!collapsed">
                <span class="text-sm font-medium flex-1 min-w-0 truncate">{{ item.name }}</span>
                <span class="ml-auto shrink-0 transition-transform duration-200">
                  <!-- ChevronDown / ChevronRight -->
                  <svg *ngIf="isDropdownOpen(item.name)" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                  </svg>
                  <svg *ngIf="!isDropdownOpen(item.name)" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                  </svg>
                </span>
              </ng-container>
            </ng-container>

            <!-- Non-dropdown: router link -->
            <ng-template #linkItem>
              <a [routerLink]="item.path || null" 
              class="flex items-center w-full" 
              [class.gap-4]="!collapsed"
                [class.justify-center]="collapsed" (click)="closeMobile()">
                <ng-container *ngTemplateOutlet="iconTpl; context: { $implicit: item.icon }"></ng-container>
                <span *ngIf="!collapsed" class="text-sm font-medium">{{ item.name }}</span>
              </a>
            </ng-template>

          </div>
          <!-- /PARENT MENU ITEM -->

          <!-- ── LEVEL-1 DROPDOWN CHILDREN ─────────────────── -->
          <div *ngIf="item.hasDropdown && !collapsed && isDropdownOpen(item.name)"
            class="ml-[33.6px] mt-1 mb-2 flex flex-col">
            <ng-container *ngFor="let child of item.children; let ci = index">
              <div class="relative flex flex-col">

                <!-- Vertical line for non-last items -->
                <div *ngIf="ci !== item.children!.length - 1" class="absolute top-0" [style.left.px]="VERTICAL_LINE_X"
                  [style.width.px]="LINE_WIDTH" [style.background-color]="lineColor"
                  [style.height]="getVerticalLineHeight(child, isDropdownOpen(item.name + '__' + child.name))"></div>

                <!-- ── LEVEL-1 ROW ── -->
                <div class="flex items-center cursor-pointer relative"
                  (click)="child.hasDropdown ? toggleDropdown(item.name + '__' + child.name) : null">

                  <!-- Connector SVG (level-1) -->
                  <svg [attr.width]="SVG_WIDTH" [attr.height]="SVG_HEIGHT"
                    [attr.viewBox]="'0 0 ' + SVG_WIDTH + ' ' + SVG_HEIGHT" class="shrink-0" fill="none">
                    <!-- Last item, no nested open → curved L -->
                    <ng-container
                      *ngIf="ci === item.children!.length - 1 && !isDropdownOpen(item.name + '__' + child.name)">
                      <path [attr.d]="getCurvedPath()" [attr.stroke]="lineColor" [attr.stroke-width]="LINE_WIDTH"
                        stroke-linecap="round" stroke-linejoin="round" />
                    </ng-container>
                    <!-- Last item with nested open OR non-last → T-branch -->
                    <ng-container
                      *ngIf="ci !== item.children!.length - 1 || isDropdownOpen(item.name + '__' + child.name)">
                      <line [attr.x1]="VERTICAL_LINE_X" y1="0" [attr.x2]="VERTICAL_LINE_X" [attr.y2]="MID_Y"
                        [attr.stroke]="lineColor" [attr.stroke-width]="LINE_WIDTH" />
                      <line [attr.x1]="VERTICAL_LINE_X" [attr.y1]="MID_Y" [attr.x2]="SVG_WIDTH" [attr.y2]="MID_Y"
                        [attr.stroke]="lineColor" [attr.stroke-width]="LINE_WIDTH" />
                    </ng-container>
                  </svg>

                  <!-- Child with nested children -->
                  <ng-container *ngIf="child.hasDropdown; else childLink">
                    <div
                      class="flex-1 flex items-center py-[6.4px] px-2 pr-2 rounded-lg transition-all text-sm min-w-0 gap-1"
                      [ngClass]="{
                        'bg-[var(--left-drawer-active-tab)] text-[#111111] font-semibold': isChildActive(child.children, currentPath),
                        'text-[var(--leftdrawer-text)] hover:bg-[var(--left-drawer-active-tab)] hover:text-[#111111]': !isChildActive(child.children, currentPath)
                      }">
                      <span class="flex-1 truncate">{{ child.name }}</span>
                      <span class="ml-auto transition-transform duration-200 shrink-0">
                        <svg *ngIf="isDropdownOpen(item.name + '__' + child.name)" xmlns="http://www.w3.org/2000/svg"
                          class="w-[13px] h-[13px]" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                          stroke-width="2">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                        </svg>
                        <svg *ngIf="!isDropdownOpen(item.name + '__' + child.name)" xmlns="http://www.w3.org/2000/svg"
                          class="w-[13px] h-[13px]" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                          stroke-width="2">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                        </svg>
                      </span>
                    </div>
                  </ng-container>

                  <!-- Plain child link -->
                  <ng-template #childLink>
                    <a [routerLink]="child.path || null" class="flex-1 min-w-0" (click)="closeMobile()">
                      <div class="py-[6.4px] px-2 rounded-lg transition-all text-sm truncate" [ngClass]="{
                          'bg-[var(--left-drawer-active-tab)] text-[#111111] font-semibold': currentPath === child.path,
                          'text-[var(--leftdrawer-text)] hover:bg-[var(--left-drawer-active-tab)] hover:text-[#111111]': currentPath !== child.path
                        }">
                        {{ child.name }}
                      </div>
                    </a>
                  </ng-template>

                </div>
                <!-- /LEVEL-1 ROW -->

                <!-- ── LEVEL-2 NESTED CHILDREN ─────────────── -->
                <div *ngIf="child.hasDropdown && isDropdownOpen(item.name + '__' + child.name)" class="flex flex-col"
                  [style.margin-left.px]="SVG_WIDTH">
                  <ng-container *ngFor="let grandchild of child.children; let gi = index">
                    <div class="relative flex flex-col">
                      <a [routerLink]="grandchild.path || null" class="flex items-center" (click)="closeMobile()">
                        <!-- Connector SVG (level-2) -->
                        <svg [attr.width]="SVG_WIDTH" [attr.height]="SVG_HEIGHT"
                          [attr.viewBox]="'0 0 ' + SVG_WIDTH + ' ' + SVG_HEIGHT" class="shrink-0" fill="none">
                          <!-- Last grandchild → curved L -->
                          <ng-container *ngIf="gi === child.children!.length - 1">
                            <path [attr.d]="getCurvedPath()" [attr.stroke]="lineColor" [attr.stroke-width]="LINE_WIDTH"
                              stroke-linecap="round" stroke-linejoin="round" />
                          </ng-container>
                          <!-- Non-last grandchild → T-branch -->
                          <ng-container *ngIf="gi !== child.children!.length - 1">
                            <line [attr.x1]="VERTICAL_LINE_X" y1="0" [attr.x2]="VERTICAL_LINE_X" [attr.y2]="SVG_HEIGHT"
                              [attr.stroke]="lineColor" [attr.stroke-width]="LINE_WIDTH" />
                            <line [attr.x1]="VERTICAL_LINE_X" [attr.y1]="MID_Y" [attr.x2]="SVG_WIDTH" [attr.y2]="MID_Y"
                              [attr.stroke]="lineColor" [attr.stroke-width]="LINE_WIDTH" />
                          </ng-container>
                        </svg>

                        <div class="flex-1 py-[6.4px] px-2 rounded-lg transition-all text-sm truncate" [ngClass]="{
                            'bg-[var(--left-drawer-active-tab)] text-[#111111] font-semibold': currentPath === grandchild.path,
                            'text-[var(--leftdrawer-text)] hover:bg-[var(--left-drawer-active-tab)] hover:text-[#111111]': currentPath !== grandchild.path
                          }">
                          {{ grandchild.name }}
                        </div>
                      </a>
                    </div>
                  </ng-container>
                </div>
                <!-- /LEVEL-2 NESTED CHILDREN -->

              </div>
            </ng-container>
          </div>
          <!-- /LEVEL-1 DROPDOWN CHILDREN -->

        </div>
      </ng-container>
    </div>
    <!-- /MENU LIST -->

    <!-- ── FOOTER (theme / collapse / power) ──────────────── -->
    <div class="px-2 pb-4" [class.px-3]="collapsed">
      <div class="rounded-xl border bg-[var(--bg-leftdrawer-footer)] border-[color:var(--left-drawer-footer-border)]
               shadow-[0_2px_6px_rgba(0,0,0,0.05)] backdrop-blur-sm transition-all duration-300" [ngClass]="{
          'flex flex-col items-center justify-center space-y-3 py-2 px-3 pr-1': collapsed,
          'flex items-center justify-around lg:justify-between px-5 py-3': !collapsed
        }">

        <!-- Theme toggle -->
        <button (click)="toggleTheme()">
          <!-- Sun (dark mode active) -->
          <svg *ngIf="theme === 'dark'" xmlns="http://www.w3.org/2000/svg" class="w-[22px] h-[22px] text-yellow-400"
            fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5" />
            <path stroke-linecap="round"
              d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
          </svg>
          <!-- Moon (light mode active) -->
          <svg *ngIf="theme !== 'dark'" xmlns="http://www.w3.org/2000/svg"
            class="w-[22px] h-[22px] text-[var(--leftdrawer-text)]" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
          </svg>
        </button>

        <!-- Collapse toggle (desktop only) -->
        <button class="hidden lg:block cursor-pointer text-[var(--leftdrawer-text)]" (click)="toggleCollapsed()">
          <!-- PanelRightClose when collapsed -->
          <svg *ngIf="collapsed" xmlns="http://www.w3.org/2000/svg" class="w-[22px] h-[22px]" fill="none"
            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <line x1="9" y1="3" x2="9" y2="21" />
            <path stroke-linecap="round" d="M14 9l3 3-3 3" />
          </svg>
          <!-- PanelLeftClose when expanded -->
          <svg *ngIf="!collapsed" xmlns="http://www.w3.org/2000/svg" class="w-[22px] h-[22px]" fill="none"
            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <line x1="15" y1="3" x2="15" y2="21" />
            <path stroke-linecap="round" d="M10 15l-3-3 3-3" />
          </svg>
        </button>

        <!-- Power / logout -->
        <button class="cursor-pointer text-[var(--leftdrawer-text)]">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-[22px] h-[22px]" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 11-12.728 0M12 3v9" />
          </svg>
        </button>

      </div>
    </div>
    <!-- /FOOTER -->

  </div>
  <!-- /SIDEBAR -->

</ng-container>

<!-- ══════════════════════════════════════════════════════════════ -->
<!-- ICON TEMPLATE — maps icon name string → inline SVG           -->
<!-- ══════════════════════════════════════════════════════════════ -->
<ng-template #iconTpl let-icon>
  <ng-container [ngSwitch]="icon">

    <svg *ngSwitchCase="'settings'" xmlns="http://www.w3.org/2000/svg" class="w-[22px] h-[22px] shrink-0" fill="none"
      viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
      <circle cx="12" cy="12" r="3" />
    </svg>

    <svg *ngSwitchCase="'download'" xmlns="http://www.w3.org/2000/svg" class="w-[22px] h-[22px] shrink-0"
      fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd"
        d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z"
        clip-rule="evenodd" />
    </svg>

    <svg *ngSwitchCase="'trend'" xmlns="http://www.w3.org/2000/svg" class="w-[22px] h-[22px] shrink-0" fill="none"
      viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
    </svg>

    <svg *ngSwitchCase="'report'" xmlns="http://www.w3.org/2000/svg" class="w-[22px] h-[22px] shrink-0" fill="none"
      viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
    </svg>

    <svg *ngSwitchCase="'link'" xmlns="http://www.w3.org/2000/svg" class="w-[22px] h-[22px] shrink-0" fill="none"
      viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
    </svg>

    <svg *ngSwitchCase="'wrench'" xmlns="http://www.w3.org/2000/svg" class="w-[22px] h-[22px] shrink-0" fill="none"
      viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 11-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 004.486-6.336l-3.276 3.277a3.004 3.004 0 01-2.25-2.25l3.276-3.276a4.5 4.5 0 00-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437l1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008z" />
    </svg>

    <svg *ngSwitchCase="'chart'" xmlns="http://www.w3.org/2000/svg" class="w-[22px] h-[22px] shrink-0" fill="none"
      viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6m0 0h4m4 0V9a2 2 0 012-2h2a2 2 0 012 2v10m0 0h-4m-8 0h16" />
    </svg>

    <svg *ngSwitchCase="'cogs'" xmlns="http://www.w3.org/2000/svg" class="w-[22px] h-[22px] shrink-0"
      fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd"
        d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z"
        clip-rule="evenodd" />
    </svg>

    <svg *ngSwitchCase="'admin'" xmlns="http://www.w3.org/2000/svg" class="w-[22px] h-[22px] shrink-0" fill="none"
      viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
    </svg>

    <!-- Default fallback icon -->
    <svg *ngSwitchDefault xmlns="http://www.w3.org/2000/svg" class="w-[22px] h-[22px] shrink-0" fill="none"
      viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10" />
    </svg>

  </ng-container>
</ng-template>
