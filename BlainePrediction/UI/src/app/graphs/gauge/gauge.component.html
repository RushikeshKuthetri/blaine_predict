
<div class="chartbOX">
  <div class="row chartRow p-all-10 ml-0 mr-0" *ngIf="datasource">
    <div class="col-xl-3 col-lg-4 col-md-6 col-sm-12 col-12 mb-4" *ngFor="let item of datasource.Tags_Data;let i=index">
      <div class="card meter h-100" (dblclick)="getBarData($event,item,i);openModal(template)">
        <div class="chart-meter" #myTestDiv>
          <div id="{{'g'+i}}" class="m-t-10 chartDiv">
          </div>
          <div class="value_span d-flex">
            <span>{{item.Process_Values.toFixed(2)}}</span>
          </div>
        </div>
        <div class="detail text-center">
          {{item.Generic_Description}}
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #template>
  <div class="modal-header">
    <h4 class="modal-title pull-left">History Data for {{title}}</h4>
    <button type="button" class="btn-close close pull-right" aria-label="Close" (click)="modalRef?.hide()">
      <span aria-hidden="true" class="visually-hidden">&times;</span>
    </button>
  </div>
  <div class="modal-body">
    <app-datetimepicker (dateTimeRange)="getDateRange($event)" type="rangepicker" [selectedRange]='graphDateRange'></app-datetimepicker>
    <app-line-chart [data]="barData" [title]="title" *ngIf="showLine"></app-line-chart>
  </div>
</ng-template>
